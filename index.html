<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Our Little Diary ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">

<header>

<h1>❤️ Our Little Diary</h1>

<p id="today"></p>

<div class="status">

<span id="connection">
🟢 Connected
</span>

<span id="username">
Guest
</span>

</div>

</header>

<nav>

<button data-page="home">
Diary
</button>

<button data-page="calendar">
Calendar
</button>

<button data-page="memory">
Memory Box
</button>

<button data-page="chat">
Chat
</button>

<button data-page="settings">
Settings
</button>

</nav>

<main id="content">

<section id="homePage">

<h2>How are you today?</h2>

<div id="moodPicker">

</div>

<textarea
id="diaryInput"
placeholder="Write something beautiful today...">
</textarea>

<button id="saveDiary">
Save Diary ❤️
</button>

<hr>

<div id="diaryList">

</div>

</section>

<section id="calendarPage" hidden>

<h2>Calendar</h2>

<div id="calendar">

</div>

</section>

<section id="memoryPage" hidden>

<h2>Memory Box</h2>

<div id="memoryList">

</div>

</section>

<section id="chatPage" hidden>

<h2>Private Chat</h2>

<div id="chatMessages">

</div>

<div class="chatInput">

<input
id="chatInput"
placeholder="Type something...">

<button id="sendChat">
Send
</button>

</div>

</section>

<section id="settingsPage" hidden>

<h2>Settings</h2>

<button id="logoutBtn">
Logout
</button>

</section>

</main>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
